version: 1
disable_existing_loggers: False

formatters:
  default:
    format: '[%(levelname)-7s] %(name)-25s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  file_format:
    format: "%(asctime)-10s [%(levelname)-7s] %(name)-25s %(module)-20s:%(lineno)-3d: %(message)s"
    datefmt: '%Y-%m-%d %H:%M:%S'

  code_generator:
    format: '%(asctime)s | %(levelname)s | %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: default
    stream: ext://sys.stdout

  file_all:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: file_format
    filename: .logs/app_info.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

  code_generator_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: code_generator
    filename: .logs/generated_codes.log
    maxBytes: 10485760
    backupCount: 10
    encoding: utf8

loggers:
  werkzeug:
    level: ERROR

  code_generator:
    level: INFO
    handlers: [console, code_generator_file]
    propagate: false

  "":
    handlers: [console, file_all]
    level: INFO
    propagate: false
